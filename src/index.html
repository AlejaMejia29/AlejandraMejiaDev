<!doctype html>
<html class="dark" lang="es">
<head>

  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {

            'surface-container': 'rgb(var(--surface-container-rgb) / <alpha-value>)',
            background: 'rgb(var(--background-rgb) / <alpha-value>)',
            'on-surface-variant': 'rgb(var(--on-surface-variant-rgb) / <alpha-value>)',
            primary: 'rgb(var(--primary-rgb) / <alpha-value>)',
            secondary: 'rgb(var(--secondary-rgb) / <alpha-value>)',
            outline: 'rgb(var(--outline-rgb) / <alpha-value>)',
            surface: 'rgb(var(--surface-rgb) / <alpha-value>)',
            'on-surface': 'rgb(var(--on-surface-rgb) / <alpha-value>)',

          borderRadius: {

          spacing: {

          },

            'body-lg': ['Inter'],

            'display-lg': ['64px', { lineHeight: '1.1', letterSpacing: '-0.02em', fontWeight: '700' }],
            'display-lg-mobile': ['40px', { lineHeight: '1.2', fontWeight: '700' }]
          }
        }
      }
    };

<body class="bg-background text-on-background font-body-lg selection:bg-primary/30 overflow-x-hidden">
  <app-root></app-root>
