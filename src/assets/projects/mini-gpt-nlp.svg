<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" fill="none">
  <defs>
    <linearGradient id="nlp-bg" x1="0" y1="0" x2="960" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12161f"/>
      <stop offset="1" stop-color="#1f1824"/>
    </linearGradient>
    <linearGradient id="nlp-rose" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#e7c1b1"/>
      <stop offset="1" stop-color="#c49a88"/>
    </linearGradient>
  </defs>
  <rect width="960" height="600" fill="url(#nlp-bg)"/>
  <circle cx="860" cy="90" r="70" fill="#e7c1b1" fill-opacity="0.07"/>
  <circle cx="100" cy="520" r="100" fill="#c49a88" fill-opacity="0.06"/>

  <!-- Notebook panel -->
  <rect x="60" y="70" width="520" height="460" rx="24" fill="#ffffff" fill-opacity="0.04" stroke="#e7c1b1" stroke-opacity="0.22"/>
  <rect x="60" y="70" width="520" height="44" rx="24" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="92" cy="92" r="7" fill="#c49a88" fill-opacity="0.7"/>
  <circle cx="116" cy="92" r="7" fill="#e7c1b1" fill-opacity="0.5"/>
  <circle cx="140" cy="92" r="7" fill="#ffffff" fill-opacity="0.25"/>
  <text x="170" y="98" fill="#ffffff" fill-opacity="0.55" font-family="ui-monospace,monospace" font-size="13">sentiment_model.ipynb</text>

  <text x="90" y="150" fill="#c49a88" font-family="ui-monospace,monospace" font-size="13"># Mini-GPT · PyTorch</text>
  <text x="90" y="178" fill="#ffffff" fill-opacity="0.75" font-family="ui-monospace,monospace" font-size="13">model = TransformerDecoder(...)</text>
  <text x="90" y="206" fill="#ffffff" fill-opacity="0.55" font-family="ui-monospace,monospace" font-size="13">tokens = tokenizer(reviews)</text>
  <rect x="90" y="228" width="380" height="36" rx="8" fill="#e7c1b1" fill-opacity="0.1" stroke="#e7c1b1" stroke-opacity="0.2"/>
  <text x="108" y="251" fill="#e7c1b1" font-family="ui-monospace,monospace" font-size="12">accuracy: 90.68%</text>

  <!-- Token chips -->
  <rect x="90" y="290" width="72" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="126" y="309" text-anchor="middle" fill="#ffffff" fill-opacity="0.7" font-family="ui-monospace,monospace" font-size="11">[CLS]</text>
  <rect x="172" y="290" width="88" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="216" y="309" text-anchor="middle" fill="#ffffff" fill-opacity="0.7" font-family="ui-monospace,monospace" font-size="11">excelente</text>
  <rect x="270" y="290" width="72" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="306" y="309" text-anchor="middle" fill="#ffffff" fill-opacity="0.7" font-family="ui-monospace,monospace" font-size="11">comida</text>
  <rect x="352" y="290" width="56" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
  <text x="380" y="309" text-anchor="middle" fill="#ffffff" fill-opacity="0.7" font-family="ui-monospace,monospace" font-size="11">...</text>

  <!-- Attention blocks -->
  <rect x="90" y="350" width="110" height="140" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="145" y="378" text-anchor="middle" fill="#e7c1b1" font-family="Inter,Arial,sans-serif" font-size="11">Embed</text>
  <rect x="215" y="350" width="110" height="140" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#e7c1b1" stroke-opacity="0.25"/>
  <text x="270" y="378" text-anchor="middle" fill="#e7c1b1" font-family="Inter,Arial,sans-serif" font-size="11">Attention</text>
  <rect x="340" y="350" width="110" height="140" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="395" y="378" text-anchor="middle" fill="#e7c1b1" font-family="Inter,Arial,sans-serif" font-size="11">Output</text>
  <path d="M200 420h15M325 420h15" stroke="#c49a88" stroke-opacity="0.5" stroke-width="2"/>

  <!-- Sentiment card -->
  <rect x="620" y="110" width="280" height="380" rx="28" fill="#ffffff" fill-opacity="0.05" stroke="url(#nlp-rose)" stroke-opacity="0.4"/>
  <rect x="650" y="145" width="220" height="36" rx="18" fill="url(#nlp-rose)" fill-opacity="0.85"/>
  <text x="760" y="168" text-anchor="middle" fill="#1a1412" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700">Sentiment</text>

  <rect x="650" y="210" width="220" height="100" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="670" y="240" fill="#ffffff" fill-opacity="0.65" font-family="Inter,Arial,sans-serif" font-size="13">"La comida estuvo</text>
  <text x="670" y="262" fill="#ffffff" fill-opacity="0.65" font-family="Inter,Arial,sans-serif" font-size="13">excelente, volver&#233;."</text>
  <rect x="670" y="285" width="88" height="26" rx="13" fill="#4ade80" fill-opacity="0.2" stroke="#4ade80" stroke-opacity="0.45"/>
  <text x="714" y="303" text-anchor="middle" fill="#86efac" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="600">Positivo</text>

  <rect x="650" y="340" width="220" height="100" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="670" y="370" fill="#ffffff" fill-opacity="0.65" font-family="Inter,Arial,sans-serif" font-size="13">"Muy lento el</text>
  <text x="670" y="392" fill="#ffffff" fill-opacity="0.65" font-family="Inter,Arial,sans-serif" font-size="13">servicio."</text>
  <rect x="670" y="415" width="88" height="26" rx="13" fill="#f87171" fill-opacity="0.18" stroke="#f87171" stroke-opacity="0.4"/>
  <text x="714" y="433" text-anchor="middle" fill="#fca5a5" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="600">Negativo</text>
</svg>
